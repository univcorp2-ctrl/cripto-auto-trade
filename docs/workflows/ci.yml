# Backup copy of .github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev,web,live]'
      - run: ruff check .
      - run: pytest -q
      - run: python -m cripto_auto_trade.cli validate --iterations 200
